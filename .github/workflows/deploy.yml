name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-devnet:
    runs-on: ubuntu-latest
    environment: devnet

    steps:
      - uses: actions/checkout@v3

      - name: Install Solana
        uses: metadaoproject/setup-solana@v1
        with:
          solana-cli-version: 1.17.0

      - name: Install Anchor
        uses: metadaoproject/setup-anchor@v1
        with:
          anchor-cli-version: 0.29.0

      - name: Configure Solana
        run: |
          solana config set --url devnet
          echo "${{ secrets.SOLANA_KEYPAIR }}" > keypair.json
          solana config set --keypair keypair.json

      - name: Deploy contracts
        run: |
          cd programs/human-registry
          anchor deploy --provider.cluster devnet

      - name: Deploy backend
        run: |
          bash scripts/deploy-backend.sh
        env:
          DEPLOYMENT_MODE: production

      - name: Deploy frontend
        run: |
          bash scripts/deploy-frontend.sh
        env:
          DEPLOYMENT_MODE: production