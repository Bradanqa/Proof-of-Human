[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
env =
    SECRET_KEY=test-secret-key
    SCORE_THRESHOLD=70
    SOLANA_RPC_URL=https://api.devnet.solana.com